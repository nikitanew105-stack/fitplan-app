<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FitPlan</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select, button {
      display: block;
      margin: 10px 0;
      padding: 12px;
      width: 100%;
      font-size: 16px;
    }
    button {
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<h2>Твой план питания</h2>

<input id="weight" placeholder="Вес (кг)">
<input id="height" placeholder="Рост (см)">

<select id="goal">
  <option>Похудение</option>
  <option>Набор</option>
  <option>Поддержание</option>
</select>

<button onclick="generate()">Сформировать план</button>

<pre id="result"></pre>

<script>
async function generate() {
  const weight = document.getElementById('weight').value;
  const height = document.getElementById('height').value;
  const goal = document.getElementById('goal').value;

  const res = await fetch('/api/generate', {
    method: 'POST',
    body: JSON.stringify({ weight, height, goal })
  });

  const data = await res.json();
  document.getElementById('result').innerText = data.text;
}
</script>

</body>
</html>
