<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>План питания</title>
</head>
<body>

<h2>Твой план питания</h2>

<input placeholder="Вес (кг)" />
<br><br>

<input placeholder="Рост (см)" />
<br><br>

<select>
  <option>Похудение</option>
  <option>Набор</option>
</select>

<br><br>

<button onclick="generatePlan()">Сформировать план</button>

<pre id="result"></pre>

<script>
async function generatePlan() {
  const inputs = document.querySelectorAll("input");

  const weight = inputs[0].value;
  const height = inputs[1].value;
  const goal = document.querySelector("select").value;

  const res = await fetch("/api/generate", {
    method: "POST",
    body: JSON.stringify({ weight, height, goal })
  });

  const data = await res.json();

  console.log(data);

  document.getElementById("result").innerText =
    data.result || JSON.stringify(data);
}
</script>

</body>
</html>
